services:
  db:
    image: mysql:8.0
    container_name: cowork_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: passwd
      MYSQL_DATABASE: tessst
    volumes:
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppasswd"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cowork_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: passwd
      UPLOAD_LIMIT: 64M  # Увеличил лимит на загрузку файлов (полезно для импорта больших .sql дампов)
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: cowork_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=passwd
      - DB_NAME=tessst
      - JWT_SECRET=nejhrghsiodhrguiehroigie
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: cowork_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NUXT_API_PROXY=http://cowork_backend:5000/api/**
    depends_on:
      - backend

volumes:
  db_data:
